# Run the mcorr cnmf pipeline on test data on the local runner

# To update the `yml` file without triggering the job, use the `[skip ci]` or `[ci skip]` keyword in your commit message. 
# e.g.:
# ```
# Update run_batch_mcorr_cnmf_pipeline.yml [skip ci]
# ```

name: Test MCorr CNMF Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    # runs-on: ubuntu-latest
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
            
      - name: Create logs directory
        run: |
            mkdir -p pipeline/logs

      - name: Copy test JSON file
        run: cp ~/code/imaging_analysis/spin-top-test-data/paths_test_data.json pipeline/configs/paths_test_data.json
            
      - name: Run batch mcorr cnmf pipeline
        run: |
            # Source conda to enable the commands
            source ~/mambaforge/etc/profile.d/conda.sh
            # Activate the conda environment
            conda activate mescore
            # Resolve the absolute path of the JSON file
            # PATHS_FILE=$(realpath Mesmerize/paths/paths_test_data.json)
            # List the directory to verify the file exists
            ls -l pipeline/configs
            # Use GITHUB_WORKSPACE to build the absolute path
            CONFIG_FILE=$(realpath "$GITHUB_WORKSPACE/pipeline/configs/paths_test_data.json")
            echo "Using config file: $CONFIG_FILE"
            # Run the pipeline
            python pipeline/pipeline_mcorr.py $CONFIG_FILE
            python pipeline/pipeline_cnmf.py $CONFIG_FILE

      - name: Check logs
        run: |
            # Check the logs for errors
            if grep -q "ERROR" pipeline/logs/*.log; then
                echo "Errors found in logs"
                exit 1
            else
                echo "No errors found in logs"
            fi

      - name: Check output
        run: |
            # Check the export path (in export_paths field in paths_test_data.json)
            EXPORT_PATH=$(jq -r '.paths.output_dir' pipeline/configs/paths_test_data.json)
            # List the files in the export path
            echo "Files in export path:"
            tree $EXPORT_PATH
            # Check if the output files exist
            if [ -f "$EXPORT_PATH/results_caiman.mat" ]; then
                echo "Output file results_caiman.mat exists"
            else
                echo "Output file results_caiman.mat does not exist"
                exit 1
            fi

      - name: Deactivate conda environment
        run: |
              conda deactivate || echo "Environment not active or failed to deactivate"

      - name: Delete logs directory
        run: |
              rm -rf Mesmerize/logs              

      - name: Delete output directory
        if: always()
        run: |
              rm -rf $EXPORT_PATH
