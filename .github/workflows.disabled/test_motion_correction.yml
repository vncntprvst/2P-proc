name: Motion Correction Test

on:
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'Mesmerize/pipeline_mcorr_cnmf.py'
  #     - 'Mesmerize/batch_mcorr_cnmf.py'
  #     - 'Mesmerize/bruker_concat_tif.py'
  #     - 'Mesmerize/compute_zcorr.py'
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  test-motion-correction:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: "latest"
        python-version: 3.9
        activate-environment: mescore
        
    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install -y -c conda-forge caiman
        pip install mesmerize-core pytest
        pip install -e .
        
    - name: Download test data
      shell: bash -l {0}
      run: |
        bash scripts/download_test_data.sh
        
    - name: Run motion correction test
      shell: bash -l {0}
      run: |
        cd tests
        python -m pytest test_motion_correction.py -v
